<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="tile" gradientUnits="userSpaceOnUse" x1="60" y1="30" x2="452" y2="482">
      <stop offset="0" stop-color="#2A2140"/><stop offset="1" stop-color="#150F22"/>
    </linearGradient>
    <radialGradient id="glow" gradientUnits="userSpaceOnUse" cx="256" cy="252" r="300">
      <stop offset="0"    stop-color="#E85CC6" stop-opacity="0.70"/>
      <stop offset="0.32" stop-color="#A24DE8" stop-opacity="0.45"/>
      <stop offset="0.62" stop-color="#6D28D9" stop-opacity="0.18"/>
      <stop offset="1"    stop-color="#6D28D9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="crack" gradientUnits="userSpaceOnUse" cx="256" cy="252" r="300">
      <stop offset="0"   stop-color="#F569D2"/>
      <stop offset="0.5" stop-color="#A24DE8"/>
      <stop offset="1"   stop-color="#6D28D9"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>
    <clipPath id="tileclip"><rect x="0" y="0" width="512" height="512" rx="112"/></clipPath>
    <clipPath id="n"><polygon points="150,168 168,150 212,150 300,274 300,168 318,150 344,150 362,168 362,344 344,362 300,362 212,238 212,344 194,362 168,362 150,344"/></clipPath>
  </defs>

  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#tile)"/>

  <g clip-path="url(#tileclip)">
    <!-- soft pink/purple bloom behind the N -->
    <rect x="0" y="0" width="512" height="512" fill="url(#glow)"/>
    <!-- a few clean glowing cracks radiating from behind the mark -->
    <g fill="none" stroke="url(#crack)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.6" filter="url(#soft)">
      <polyline points="256,252 250,150 262,58 258,18"/>
      <polyline points="256,252 352,188 432,118 472,66"/>
      <polyline points="256,252 360,272 462,300 502,292"/>
      <polyline points="256,252 342,352 422,442 452,500"/>
      <polyline points="256,252 242,360 250,462 244,506"/>
      <polyline points="256,252 158,338 78,430 44,492"/>
      <polyline points="256,252 150,248 58,240 14,256"/>
      <polyline points="256,252 172,178 90,88 54,44"/>
    </g>
  </g>

  <!-- faceted N (tones lifted so it's less dark, reads over the glow) -->
  <g clip-path="url(#n)">
    <polygon points="150,150 181,150 181,362 150,362" fill="#7A6CA0"/>
    <polygon points="181,150 212,150 212,362 181,362" fill="#645688"/>
    <polygon points="300,150 331,150 331,362 300,362" fill="#544778"/>
    <polygon points="331,150 362,150 362,362 331,362" fill="#443A62"/>
    <polygon points="150,150 181,150 331,362 300,362" fill="#9385BC"/>
    <polygon points="181,150 212,150 362,362 331,362" fill="#7C6EAC"/>
  </g>
</svg>
