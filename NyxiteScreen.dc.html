<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  :root{--app-bg:#ECE8F5;--chrome:#FFFFFF;--chrome-2:#F6F4FB;--area:#E5E0EF;--page:#FFFFFF;--text:#221B33;--soft:#6A6480;--faint:#9D97AE;--border:#E5E0EE;--border-2:#D5CEE3;--accent:#4C1D95;--accent-2:#6D28D9;--accent-soft:#ECE6F8;--rail:#2A2140;--rail-text:#BBB3D0;--grid:#E7E2F0;--cell-head:#F4F1FA;--shadow:0 6px 24px rgba(44,22,80,.10),0 1px 3px rgba(44,22,80,.08);}
  [data-theme="dark"]{--app-bg:#0E0A17;--chrome:#191322;--chrome-2:#14101D;--area:#100B1A;--page:#221B30;--text:#ECE8F5;--soft:#A39DB7;--faint:#6E6882;--border:#2A2339;--border-2:#382F4D;--accent:#8B5CF6;--accent-2:#A78BFA;--accent-soft:#251C3A;--rail:#0A0712;--rail-text:#9E97B2;--grid:#272036;--cell-head:#1C1628;--shadow:0 8px 30px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.4);}
  .nyx-ic{display:flex;align-items:center;justify-content:center;border-radius:9px;border:none;background:transparent;color:var(--soft);flex:none;}
</style>
</helmet>

<div style="height:100%;width:100%;font-family:'Manrope',system-ui,sans-serif;color:var(--text);">

  <!-- ================= DESKTOP ================= -->
  <sc-if value="{{ isDesktop }}" hint-placeholder-val="{{ true }}">
  <div style="height:100%;display:flex;">
    <!-- rail -->
    <div style="width:56px;flex:none;background:var(--rail);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;">
      <div style="width:34px;height:34px;border-radius:9px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;margin-bottom:8px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg></div>
      <div style="{{ railDoc }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg></div>
      <div style="{{ railSlides }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M9 21h6M12 17v4"/></svg></div>
      <div style="{{ railSheet }}"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></div>
    </div>
    <!-- sidebar -->
    <sc-if value="{{ filesSidebar }}" hint-placeholder-val="{{ true }}">
    <div style="width:212px;flex:none;background:var(--chrome);border-right:1px solid var(--border);padding:16px 12px;display:flex;flex-direction:column;gap:2px;">
      <span style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);padding:0 6px 8px;">Workspace</span>
      <div style="position:relative;display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;font-weight:600;color:var(--accent);background:var(--accent-soft);"><span style="position:absolute;left:0;top:7px;bottom:7px;width:3px;border-radius:3px;background:var(--accent);"></span><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg><span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ title }}</span></div>
      <div style="display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--soft);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 3v18"/></svg>Q3 Roadmap</div>
      <div style="display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:8px;font-size:13px;color:var(--soft);"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M9 21h6"/></svg>Kickoff deck</div>
    </div>
    </sc-if>
    <sc-if value="{{ slidesSidebar }}" hint-placeholder-val="{{ true }}">
    <div style="width:172px;flex:none;background:var(--chrome);border-right:1px solid var(--border);padding:14px 12px;display:flex;flex-direction:column;gap:10px;">
      <span style="font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);">Slides</span>
      <div style="display:flex;gap:8px;align-items:flex-start;"><span style="font-size:11px;font-weight:700;color:var(--accent);width:10px;margin-top:2px;">1</span><div style="flex:1;aspect-ratio:16/9;border-radius:6px;background:var(--page);box-shadow:0 0 0 2px var(--accent);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;"><div style="width:60%;height:6px;border-radius:2px;background:var(--border-2);"></div><div style="width:40%;height:4px;border-radius:2px;background:var(--border);"></div></div></div>
      <div style="display:flex;gap:8px;align-items:flex-start;"><span style="font-size:11px;font-weight:700;color:var(--faint);width:10px;margin-top:2px;">+</span><div style="flex:1;aspect-ratio:16/9;border-radius:6px;border:1.5px dashed var(--border-2);display:flex;align-items:center;justify-content:center;color:var(--faint);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg></div></div>
    </div>
    </sc-if>
    <!-- main -->
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
      <div style="height:50px;flex:none;background:var(--chrome);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;padding:0 16px;">
        <span style="font-size:14px;font-weight:700;">{{ title }}</span>
        <span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--faint);"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M7 18a4 4 0 0 1-.5-7.96A5.5 5.5 0 0 1 17 9.5a3.5 3.5 0 0 1 .5 8.5z"/><path d="M9.5 13.5l1.7 1.7 3.3-3.4"/></svg>Saved</span>
        <div style="flex:1;"></div>
        <div style="display:flex;align-items:center;gap:7px;height:32px;padding:0 11px;border:1px solid var(--border);border-radius:8px;background:var(--chrome-2);color:var(--faint);font-size:12.5px;width:160px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>Search</div>
        <div style="display:flex;align-items:center;gap:6px;height:32px;padding:0 12px;border-radius:8px;background:var(--accent);color:#fff;font-size:12.5px;font-weight:600;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.2 10.8l7.6-4.4M8.2 13.2l7.6 4.4"/></svg>Share</div>
        <div style="display:flex;align-items:center;"><div style="width:28px;height:28px;border-radius:50%;background:#10B981;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--chrome);">AM</div><div style="width:28px;height:28px;border-radius:50%;background:#F59E0B;color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--chrome);margin-left:-8px;">RK</div></div>
      </div>
      <dc-import name="NyxiteToolbar" variant="{{ effToolbar }}" doc-type="{{ docType }}" style="flex:none;" hint-size="100%,46px"></dc-import>
      <dc-import name="NyxiteCanvas" device="desktop" doc-type="{{ docType }}" style="flex:1 1 auto;min-height:0;min-width:0;display:flex;flex-direction:column;" hint-size="100%,100%"></dc-import>
    </div>
  </div>
  </sc-if>

  <!-- ================= TABLET ================= -->
  <sc-if value="{{ isTablet }}" hint-placeholder-val="{{ true }}">
  <div style="height:100%;display:flex;">
    <div style="width:52px;flex:none;background:var(--rail);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:4px;">
      <div style="width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;margin-bottom:6px;"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/></svg></div>
      <div style="{{ railDocT }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg></div>
      <div style="{{ railSlidesT }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M9 21h6M12 17v4"/></svg></div>
      <div style="{{ railSheetT }}"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></div>
    </div>
    <div style="flex:1;min-width:0;display:flex;flex-direction:column;">
      <div style="height:48px;flex:none;background:var(--chrome);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;padding:0 12px;">
        <div class="nyx-ic" style="width:30px;height:30px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4v16"/></svg></div>
        <span style="font-size:13.5px;font-weight:700;">{{ title }}</span>
        <div style="flex:1;"></div>
        <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border:1px solid var(--border);border-radius:8px;background:var(--chrome-2);color:var(--soft);"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg></div>
        <div style="display:flex;align-items:center;gap:6px;height:32px;padding:0 11px;border-radius:8px;background:var(--accent);color:#fff;font-size:12px;font-weight:600;"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.2 10.8l7.6-4.4M8.2 13.2l7.6 4.4"/></svg>Share</div>
      </div>
      <dc-import name="NyxiteToolbar" variant="{{ effToolbar }}" doc-type="{{ docType }}" style="flex:none;" hint-size="100%,46px"></dc-import>
      <dc-import name="NyxiteCanvas" device="tablet" doc-type="{{ docType }}" style="flex:1 1 auto;min-height:0;min-width:0;display:flex;flex-direction:column;" hint-size="100%,100%"></dc-import>
    </div>
  </div>
  </sc-if>

  <!-- ================= MOBILE ================= -->
  <sc-if value="{{ isMobile }}" hint-placeholder-val="{{ true }}">
  <div style="height:100%;display:flex;flex-direction:column;background:var(--chrome);">
    <!-- status bar -->
    <div style="height:30px;flex:none;position:relative;display:flex;align-items:center;justify-content:space-between;padding:0 18px;font-size:12px;font-weight:700;">
      <span>9:41</span>
      <span style="position:absolute;left:50%;top:0;transform:translateX(-50%);width:78px;height:17px;background:#0A0712;border-radius:0 0 11px 11px;"></span>
      <span style="display:flex;align-items:center;gap:5px;"><svg width="15" height="11" viewBox="0 0 18 12" fill="currentColor"><rect x="0" y="7" width="3" height="5" rx="1"/><rect x="4.5" y="4.5" width="3" height="7.5" rx="1"/><rect x="9" y="2" width="3" height="10" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity=".3"/></svg><svg width="21" height="11" viewBox="0 0 26 13" fill="none"><rect x="1" y="1" width="21" height="11" rx="3" stroke="currentColor" stroke-width="1.2"/><rect x="3" y="3" width="15" height="7" rx="1.5" fill="currentColor"/><rect x="23" y="4.5" width="2" height="4" rx="1" fill="currentColor"/></svg></span>
    </div>
    <!-- top bar -->
    <div style="height:50px;flex:none;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;padding:0 12px;">
      <div class="nyx-ic" style="width:34px;height:34px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h16M4 6h16M4 18h16"/></svg></div>
      <div style="flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;"><span style="font-size:13.5px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px;">{{ title }}</span><span style="font-size:10px;color:var(--faint);font-weight:600;">Saved</span></div>
      <div class="nyx-ic" style="width:34px;height:34px;"><svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="2.6"/><circle cx="6" cy="12" r="2.6"/><circle cx="18" cy="19" r="2.6"/><path d="M8.2 10.8l7.6-4.4M8.2 13.2l7.6 4.4"/></svg></div>
      <div class="nyx-ic" style="width:34px;height:34px;"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg></div>
    </div>
    <!-- canvas -->
    <dc-import name="NyxiteCanvas" device="mobile" doc-type="{{ docType }}" style="flex:1 1 auto;min-height:0;min-width:0;display:flex;flex-direction:column;position:relative;" hint-size="100%,100%"></dc-import>
    <!-- format strip / minimal pill -->
    <sc-if value="{{ stripSlim }}" hint-placeholder-val="{{ true }}">
    <div style="height:46px;flex:none;border-top:1px solid var(--border);display:flex;align-items:center;gap:2px;padding:0 10px;">
      <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:800;font-size:15px;">B</div>
      <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-style:italic;font-family:'Source Serif 4',serif;font-size:16px;">I</div>
      <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;text-decoration:underline;font-size:15px;">U</div>
      <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
      <div class="nyx-ic" style="width:32px;height:32px;background:var(--accent-soft);color:var(--accent);"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h12M3 18h15"/></svg></div>
      <div class="nyx-ic" style="width:32px;height:32px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.8"/><path d="M21 16l-5-5L5 20"/></svg></div>
      <div style="flex:1;"></div>
      <div class="nyx-ic" style="width:32px;height:32px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14L4 9l5-5"/><path d="M4 9h11a6 6 0 0 1 0 12h-4"/></svg></div>
    </div>
    </sc-if>
    <sc-if value="{{ stripMinimal }}" hint-placeholder-val="{{ true }}">
    <div style="height:54px;flex:none;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:center;">
      <div style="display:flex;align-items:center;gap:2px;background:var(--chrome);border:1px solid var(--border-2);border-radius:12px;box-shadow:var(--shadow);padding:5px;">
        <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-weight:800;font-size:15px;">B</div>
        <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-style:italic;font-family:'Source Serif 4',serif;font-size:16px;">I</div>
        <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;text-decoration:underline;font-size:15px;">U</div>
        <div style="width:1px;height:20px;background:var(--border);margin:0 4px;"></div>
        <div class="nyx-ic" style="width:32px;height:32px;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M3 12h12M3 18h15"/></svg></div>
      </div>
    </div>
    </sc-if>
    <!-- bottom tab bar -->
    <div style="height:58px;flex:none;border-top:1px solid var(--border);display:flex;align-items:stretch;padding:6px 6px 10px;">
      <div style="{{ tabDoc }}"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/><path d="M9 13h6M9 17h4"/></svg><span style="font-size:10px;font-weight:700;">Docs</span></div>
      <div style="{{ tabSlides }}"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M9 21h6M12 17v4"/></svg><span style="font-size:10px;font-weight:600;">Slides</span></div>
      <div style="{{ tabSheet }}"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg><span style="font-size:10px;font-weight:600;">Sheets</span></div>
      <div style="flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--faint);"><svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg><span style="font-size:10px;font-weight:600;">You</span></div>
    </div>
  </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:900,&quot;height&quot;:560},&quot;device&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;desktop&quot;,&quot;tablet&quot;,&quot;mobile&quot;],&quot;default&quot;:&quot;desktop&quot;,&quot;tsType&quot;:&quot;'desktop'|'tablet'|'mobile'&quot;},&quot;docType&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;doc&quot;,&quot;slides&quot;,&quot;sheet&quot;],&quot;default&quot;:&quot;doc&quot;,&quot;tsType&quot;:&quot;'doc'|'slides'|'sheet'&quot;},&quot;toolbar&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;classic&quot;,&quot;slim&quot;,&quot;minimal&quot;],&quot;default&quot;:&quot;classic&quot;,&quot;tsType&quot;:&quot;'classic'|'slim'|'minimal'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const device = p.device || 'desktop';
    const docType = p.docType || 'doc';
    let toolbar = p.toolbar || 'classic';
    // toolbar support clamping per device
    if (device === 'tablet' && toolbar === 'classic') toolbar = 'slim';
    if (device === 'mobile' && (toolbar === 'classic')) toolbar = 'slim';

    const railOn = 'width:42px;height:38px;border-radius:11px;background:rgba(255,255,255,.16);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14);';
    const railOff = 'width:42px;height:38px;border-radius:11px;color:var(--rail-text);display:flex;align-items:center;justify-content:center;';
    const railOnT = railOn.replace('42px;height:38px', '38px;height:36px');
    const railOffT = railOff.replace('42px;height:38px', '38px;height:36px');

    const tabOn = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--accent);';
    const tabOff = 'flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:var(--faint);';

    const titles = { doc: 'Project brief', slides: 'Kickoff deck', sheet: 'Budget tracker' };

    return {
      isDesktop: device === 'desktop', isTablet: device === 'tablet', isMobile: device === 'mobile',
      docType, effToolbar: toolbar,
      title: titles[docType],
      filesSidebar: docType === 'doc' || docType === 'sheet',
      slidesSidebar: docType === 'slides',
      railDoc: docType === 'doc' ? railOn : railOff,
      railSlides: docType === 'slides' ? railOn : railOff,
      railSheet: docType === 'sheet' ? railOn : railOff,
      railDocT: docType === 'doc' ? railOnT : railOffT,
      railSlidesT: docType === 'slides' ? railOnT : railOffT,
      railSheetT: docType === 'sheet' ? railOnT : railOffT,
      stripSlim: toolbar === 'slim', stripMinimal: toolbar === 'minimal',
      tabDoc: docType === 'doc' ? tabOn : tabOff,
      tabSlides: docType === 'slides' ? tabOn : tabOff,
      tabSheet: docType === 'sheet' ? tabOn : tabOff,
    };
  }
}
</script>
</body>
</html>
