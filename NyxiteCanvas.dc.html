<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  :root{--app-bg:#ECE8F5;--chrome:#FFFFFF;--chrome-2:#F6F4FB;--area:#E5E0EF;--page:#FFFFFF;--text:#221B33;--soft:#6A6480;--faint:#9D97AE;--border:#E5E0EE;--border-2:#D5CEE3;--accent:#4C1D95;--accent-2:#6D28D9;--accent-soft:#ECE6F8;--rail:#2A2140;--rail-text:#BBB3D0;--grid:#E7E2F0;--cell-head:#F4F1FA;--shadow:0 6px 24px rgba(44,22,80,.10),0 1px 3px rgba(44,22,80,.08);}
  [data-theme="dark"]{--app-bg:#0E0A17;--chrome:#191322;--chrome-2:#14101D;--area:#100B1A;--page:#221B30;--text:#ECE8F5;--soft:#A39DB7;--faint:#6E6882;--border:#2A2339;--border-2:#382F4D;--accent:#8B5CF6;--accent-2:#A78BFA;--accent-soft:#251C3A;--rail:#0A0712;--rail-text:#9E97B2;--grid:#272036;--cell-head:#1C1628;--shadow:0 8px 30px rgba(0,0,0,.5),0 1px 3px rgba(0,0,0,.4);}
  @keyframes nyx-blink{0%,49%{opacity:1}50%,100%{opacity:0}}
</style>
</helmet>

<div style="flex:1;min-height:0;display:flex;flex-direction:column;font-family:'Manrope',system-ui,sans-serif;">

  <!-- DOC -->
  <sc-if value="{{ isDoc }}" hint-placeholder-val="{{ true }}">
  <div style="{{ areaStyle }}">
    <div style="{{ pageStyle }}">
      <div style="{{ titleStyle }}">Project brief</div>
      <div style="display:flex;gap:8px;margin:13px 0 20px;"><span style="height:6px;width:54px;border-radius:4px;background:var(--accent-soft);"></span><span style="height:6px;width:32px;border-radius:4px;background:var(--border-2);"></span></div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <div style="height:8px;width:100%;border-radius:5px;background:var(--border);"></div>
        <div style="height:8px;width:94%;border-radius:5px;background:var(--border);"></div>
        <div style="height:8px;width:82%;border-radius:5px;background:var(--border);"></div>
        <div style="height:8px;width:90%;border-radius:5px;background:var(--border);"></div>
        <div style="display:flex;align-items:center;"><div style="height:8px;width:46%;border-radius:5px;background:var(--border);"></div><span style="display:inline-block;width:2px;height:15px;background:var(--accent);animation:nyx-blink 1.1s step-end infinite;margin-left:3px;"></span></div>
      </div>
    </div>
  </div>
  </sc-if>

  <!-- SLIDES -->
  <sc-if value="{{ isSlides }}" hint-placeholder-val="{{ true }}">
  <div style="{{ slideAreaStyle }}">
    <div style="{{ slideStyle }}">
      <div style="{{ slideTitleStyle }}">Click to add title</div>
      <div style="{{ slideSubStyle }}">Click to add subtitle</div>
    </div>
  </div>
  </sc-if>

  <!-- SHEET -->
  <sc-if value="{{ isSheet }}" hint-placeholder-val="{{ true }}">
  <div style="flex:1;min-height:0;display:flex;flex-direction:column;background:var(--page);">
    <div style="display:flex;align-items:center;height:32px;flex:none;border-bottom:1px solid var(--border);background:var(--chrome);">
      <div style="display:flex;align-items:center;justify-content:space-between;width:78px;height:100%;padding:0 9px;border-right:1px solid var(--border);font-size:12px;font-weight:600;">A1 <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg></div>
      <div style="display:flex;align-items:center;justify-content:center;width:34px;height:100%;border-right:1px solid var(--border);color:var(--faint);font-style:italic;font-size:12px;">fx</div>
    </div>
    <div style="flex:1;min-height:0;overflow:hidden;">
      <div style="width:max-content;">
        <div style="display:flex;">
          <div style="{{ cornerStyle }}"></div>
          <sc-for list="{{ cols }}" as="c" hint-placeholder-count="6"><div style="{{ colHeadStyle }}">{{ c }}</div></sc-for>
        </div>
        <sc-for list="{{ rows }}" as="r" hint-placeholder-count="16">
          <div style="display:flex;">
            <div style="{{ rowHeadStyle }}">{{ r.n }}</div>
            <sc-for list="{{ r.cells }}" as="c" hint-placeholder-count="6"><div style="{{ cellStyle }}"></div></sc-for>
          </div>
        </sc-for>
      </div>
    </div>
  </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:620,&quot;height&quot;:420},&quot;device&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;desktop&quot;,&quot;tablet&quot;,&quot;mobile&quot;],&quot;default&quot;:&quot;desktop&quot;,&quot;tsType&quot;:&quot;'desktop'|'tablet'|'mobile'&quot;},&quot;docType&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;doc&quot;,&quot;slides&quot;,&quot;sheet&quot;],&quot;default&quot;:&quot;doc&quot;,&quot;tsType&quot;:&quot;'doc'|'slides'|'sheet'&quot;}}">
class Component extends DCLogic {
  renderVals() {
    const p = this.props || {};
    const device = p.device || 'desktop';
    const docType = p.docType || 'doc';
    const SZ = {
      desktop: { pad: '26px 22px 0', pageMaxW: '520px', pagePad: '46px 56px', titleFs: '26px', slidePad: '22px', slideMaxW: '470px', slideTitleFs: '30px', slideSubFs: '17px', cols: 8, rows: 18, cellW: 90 },
      tablet:  { pad: '22px 18px 0', pageMaxW: '440px', pagePad: '38px 44px', titleFs: '23px', slidePad: '18px', slideMaxW: '400px', slideTitleFs: '24px', slideSubFs: '15px', cols: 6, rows: 16, cellW: 86 },
      mobile:  { pad: '14px 12px',   pageMaxW: '100%',  pagePad: '24px 20px', titleFs: '20px', slidePad: '14px', slideMaxW: '100%',  slideTitleFs: '19px', slideSubFs: '13px', cols: 5, rows: 18, cellW: 72 },
    }[device];

    const L = 'ABCDEFGHIJKLMN'.split('');
    const cols = L.slice(0, SZ.cols);
    const rows = [];
    for (let i = 1; i <= SZ.rows; i++) rows.push({ n: i, cells: cols });

    return {
      isDoc: docType === 'doc', isSlides: docType === 'slides', isSheet: docType === 'sheet',
      areaStyle: 'flex:1;min-height:0;background:var(--area);overflow:hidden;display:flex;justify-content:center;padding:' + SZ.pad + ';',
      pageStyle: 'width:100%;max-width:' + SZ.pageMaxW + ';background:var(--page);border:1px solid var(--border);border-radius:3px;box-shadow:var(--shadow);padding:' + SZ.pagePad + ';',
      titleStyle: "font-family:'Source Serif 4',serif;font-weight:600;letter-spacing:-.01em;color:var(--text);font-size:" + SZ.titleFs + ';',
      slideAreaStyle: 'flex:1;min-height:0;background:var(--area);display:flex;align-items:center;justify-content:center;padding:' + SZ.slidePad + ';',
      slideStyle: 'width:100%;max-width:' + SZ.slideMaxW + ';aspect-ratio:16/9;background:var(--page);border-radius:7px;box-shadow:0 0 0 2px var(--accent),var(--shadow);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7%;padding:7%;',
      slideTitleStyle: "font-family:'Source Serif 4',serif;font-weight:600;color:var(--faint);text-align:center;width:80%;border:2px dashed var(--border-2);border-radius:8px;padding:5% 4%;font-size:" + SZ.slideTitleFs + ';',
      slideSubStyle: 'color:var(--faint);text-align:center;width:60%;border:2px dashed var(--border-2);border-radius:8px;padding:3%;font-size:' + SZ.slideSubFs + ';',
      cols, rows,
      cornerStyle: 'width:40px;height:26px;flex:none;background:var(--cell-head);border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);',
      colHeadStyle: 'width:' + SZ.cellW + 'px;height:26px;flex:none;background:var(--cell-head);border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:var(--soft);',
      rowHeadStyle: 'width:40px;height:26px;flex:none;background:var(--cell-head);border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);display:flex;align-items:center;justify-content:center;font-size:10.5px;font-weight:600;color:var(--soft);',
      cellStyle: 'width:' + SZ.cellW + 'px;height:26px;flex:none;border-right:1px solid var(--grid);border-bottom:1px solid var(--grid);background:var(--page);',
    };
  }
}
</script>
</body>
</html>
